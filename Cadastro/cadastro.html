<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspectra - Cadastro</title>
    <link rel="stylesheet" href="../Login/style.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <div class="login-content">
          <div class="logo-verifiq">
            <span style="font-size: 32px">Inspectra</span>
          </div>

          <h1>Criar Conta</h1>
          <p class="subtitle">
            Junte-se a nós e comece a gerenciar suas atividades e segurança.
          </p>

          <form id="cadastroForm">
            <div class="input-group">
              <label for="nome"> Nome</label>
              <input type="text" id="nome" placeholder="Pedro Melo" required />
            </div>

            <div class="input-group">
              <label for="email">E-mail</label>
              <input
                type="email"
                id="email"
                placeholder="usuario@gmail.com"
                required
              />
            </div>

            <div class="input-group">
              <label for="senha">Senha</label>
              <input
                type="password"
                id="senha"
                placeholder="••••••••"
                required
              />
            </div>

            <button type="submit" id="loginBtn">Cadastre-se</button>
          </form>

          <div class="signup-link">
            Já possui uma conta? <a href="../Login/index.html">Logar</a>
          </div>

          <div id="message"></div>
        </div>
      </div>

      <div class="login-visual">
        <div class="visual-pattern"></div>
      </div>
    </div>

    <script src="cadastro.js"></script>
  </body>
</html>
