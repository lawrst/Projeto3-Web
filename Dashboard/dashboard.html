<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspectra - Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <h2><span>Inspectra</span></h2>
        <nav>
          <ul>
            <li class="active">Quadro Kanban</li>
            <li>Relatórios</li>
            <li>Configurações</li>
          </ul>
        </nav>

        <div
          class="status-seguranca"
          style="
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
          "
        >
          <p
            style="
              font-size: 11px;
              color: #86868b;
              margin-bottom: 10px;
              font-weight: 600;
              text-transform: uppercase;
            "
          >
            MONITORAMENTO
          </p>
          <div
            id="cameraContainer"
            style="
              background: #000;
              border-radius: 12px;
              height: 150px;
              position: relative;
              overflow: hidden;
              border: 1px solid #1a73e8;
              cursor: pointer;
            "
            onclick="KanbanApp.ligarCameraOpenCV()"
          >
            <div
              id="videoPlaceholder"
              style="
                height: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
              "
            >
              <div style="color: #1a73e8; font-size: 24px; margin-bottom: 8px">
                📷
              </div>
              <span
                id="labelCamera"
                style="
                  font-size: 11px;
                  color: #1a73e8;
                  font-weight: 700;
                  text-align: center;
                "
                >LIGAR CÂMERA</span
              >
            </div>
            <video
              id="webcamView"
              autoplay
              playsinline
              style="
                display: none;
                width: 100%;
                height: 100%;
                object-fit: cover;
              "
            ></video>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <header>
          <h1 id="welcomeMsg">Olá, Lawrence!</h1>
          <button id="logoutBtn">Sair</button>
        </header>

        <section class="kanban">
          <div class="column" id="to-do">
            <h3>A Fazer</h3>
            <div class="task-list" id="list-todo"></div>
            <button class="add-task" onclick="abrirModal()">
              + Nova Tarefa
            </button>
          </div>
          <div class="column" id="doing">
            <h3>Fazendo</h3>
            <div class="task-list" id="list-doing"></div>
          </div>
          <div class="column" id="done">
            <h3>Concluído</h3>
            <div class="task-list" id="list-done"></div>
          </div>
        </section>
      </main>
    </div>

    <div id="modalDetalhes" class="modal">
      <div class="modal-content">
        <span class="close" onclick="fecharModalDetalhes()">&times;</span>
        <h2 style="color: #1a73e8; margin-bottom: 20px">Editar Tarefa</h2>
        <form id="formEditar">
          <input type="hidden" id="editId" />
          <label>TÍTULO</label>
          <input
            type="text"
            id="editTitulo"
            required
            style="width: 100%; margin-bottom: 15px"
          />
          <label>DESCRIÇÃO</label>
          <textarea
            id="editDesc"
            rows="5"
            style="width: 100%; margin-bottom: 20px"
          ></textarea>
          <button
            type="submit"
            style="background-color: #28a745; color: white; width: 100%"
          >
            Salvar Alterações
          </button>
        </form>
      </div>
    </div>

    <div id="modalTarefa" class="modal">
      <div class="modal-content">
        <span class="close" onclick="fecharModal()">&times;</span>
        <h2>Nova Tarefa</h2>
        <form id="formTarefa">
          <label>Título</label>
          <input type="text" id="tituloTarefa" required />
          <label>Descrição</label>
          <textarea id="descTarefa" rows="4"></textarea>
          <button type="submit">Criar Tarefa</button>
        </form>
      </div>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
