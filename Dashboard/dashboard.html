<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspectra - Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <h2><span>Inspectra</span></h2>
        <nav>
          <ul>
            <li class="active">Quadro Kanban</li>
            <li>Relatórios</li>
            <li>Configurações</li>
          </ul>
        </nav>

        <div
          class="status-seguranca"
          style="
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
          "
        >
          <p
            style="
              font-size: 12px;
              color: #86868b;
              margin-bottom: 10px;
              font-weight: 600;
              text-transform: uppercase;
            "
          >
            Câmera
          </p>
          <div
            id="cameraStatus"
            class="camera-preview"
            style="
              background: #000;
              border-radius: 12px;
              height: 150px;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              cursor: pointer;
              border: 1px solid var(--primary);
              transition: 0.3s;
            "
            onclick="KanbanApp.ligarCameraOpenCV()"
          >
            <div
              id="videoPlaceholder"
              style="color: var(--primary); font-size: 24px; margin-bottom: 8px"
            >
              📷
            </div>
            <span
              id="labelCamera"
              style="
                font-size: 12px;
                color: var(--primary);
                font-weight: 700;
                text-align: center;
                padding: 0 10px;
              "
              >LIGAR MONITORAMENTO</span
            >
          </div>
        </div>
      </aside>

      <main class="main-content">
        <header>
          <h1 id="welcomeMsg">Olá, Lawrence!</h1>
          <button id="logoutBtn">Sair</button>
        </header>

        <section class="kanban">
          <div class="column" id="to-do">
            <h3>A Fazer</h3>
            <div class="task-list" id="list-todo"></div>
            <button class="add-task" onclick="abrirModal()">
              + Nova Tarefa
            </button>
          </div>

          <div class="column" id="doing">
            <h3>Fazendo</h3>
            <div class="task-list" id="list-doing"></div>
          </div>

          <div class="column" id="done">
            <h3>Concluído</h3>
            <div class="task-list" id="list-done"></div>
          </div>
        </section>
      </main>
    </div>

    <div id="modalTarefa" class="modal">
      <div class="modal-content">
        <span class="close" onclick="fecharModal()">&times;</span>
        <h2 style="margin-bottom: 20px">Nova Tarefa</h2>
        <form id="formTarefa">
          <label>TÍTULO</label>
          <input
            type="text"
            id="tituloTarefa"
            placeholder="Ex: Estudar Redes na UFRPE"
            required
          />

          <label style="margin-top: 20px; display: block">DESCRIÇÃO</label>
          <textarea
            id="descTarefa"
            rows="4"
            placeholder="Detalhes da atividade..."
          ></textarea>

          <button type="submit">Salvar Tarefa</button>
        </form>
      </div>
    </div>

    <div id="modalDetalhes" class="modal">
      <div class="modal-content">
        <span class="close" onclick="fecharModalDetalhes()">&times;</span>
        <h2 id="detalheTitulo" style="color: #1a73e8; margin-bottom: 15px"></h2>
        <hr
          style="border: 0; border-top: 1px solid #d2d2d7; margin-bottom: 20px"
        />
        <p id="detalheDesc" style="color: #515154; line-height: 1.6"></p>
      </div>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
